<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>النظام المالي التنفيذي | شركة الطيف الأولى</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#eef1f6; --surface:#ffffff; --surface-2:#f7f9fc; --border:#e2e8f0;
  --text:#1a2233; --text-2:#5b6577; --muted:#8a94a6;
  --primary:#1f6feb; --primary-2:#0d47a1; --accent:#c9a227;
  --green:#1b9e5a; --green-bg:#e6f7ee; --red:#d64545; --red-bg:#fdeaea;
  --amber:#e0a92e; --amber-bg:#fdf5e2; --purple:#7c4dff;
  --shadow:0 2px 8px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
  --shadow-lg:0 8px 40px rgba(20,30,60,.14);
  --radius:16px; --radius-sm:10px;
  --sidebar:280px;
}
[data-theme="dark"]{
  --bg:#0c1018; --surface:#141a24; --surface-2:#1b2431; --border:#26303f;
  --text:#e7edf5; --text-2:#a8b3c4; --muted:#6f7d90;
  --primary:#4d90fe; --primary-2:#7cb0ff; --accent:#e6c35c;
  --green:#33c37d; --green-bg:#0f2a1e; --red:#f06565; --red-bg:#2c1618;
  --amber:#f0be4a; --amber-bg:#2b2410; --purple:#9d7bff;
  --shadow:0 2px 8px rgba(0,0,0,.3),0 8px 24px rgba(0,0,0,.35);
  --shadow-lg:0 10px 44px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Tajawal','Cairo',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;transition:background .3s,color .3s}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
h1,h2,h3,h4{font-family:'Cairo',sans-serif;font-weight:700;line-height:1.3}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
a{color:var(--primary);text-decoration:none}
.hidden{display:none!important}

/* ===== Login ===== */
#login{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1f3c,#1f6feb 120%);z-index:1000;padding:20px}
.login-card{background:var(--surface);border-radius:24px;box-shadow:var(--shadow-lg);width:100%;max-width:420px;padding:42px 38px;text-align:center;animation:pop .4s ease}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.login-logo{width:76px;height:76px;border-radius:20px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:flex;align-items:center;justify-content:center;font-size:38px;margin:0 auto 18px;color:#fff;box-shadow:0 8px 24px rgba(31,111,235,.4)}
.login-card h1{font-size:23px;margin-bottom:4px}
.login-card p{color:var(--text-2);margin-bottom:26px;font-size:14px}
.field{text-align:right;margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--text-2)}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--surface-2);color:var(--text);transition:border .2s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary)}
.btn{border:none;border-radius:12px;padding:12px 20px;font-weight:700;font-size:14px;background:var(--primary);color:#fff;transition:transform .12s,box-shadow .2s,background .2s;display:inline-flex;align-items:center;gap:8px;justify-content:center}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(31,111,235,.35)}
.btn:active{transform:translateY(0)}
.btn.block{width:100%}
.btn.ghost{background:var(--surface-2);color:var(--text);border:1.5px solid var(--border)}
.btn.ghost:hover{box-shadow:var(--shadow)}
.btn.green{background:var(--green)}.btn.red{background:var(--red)}.btn.amber{background:var(--amber);color:#3a2e05}
.btn.sm{padding:7px 12px;font-size:12.5px;border-radius:9px}
.login-hint{margin-top:18px;font-size:12px;color:var(--muted)}

/* ===== Layout ===== */
#app{display:flex;min-height:100vh}
#sidebar{width:var(--sidebar);background:var(--surface);border-left:1px solid var(--border);position:fixed;top:0;right:0;bottom:0;overflow-y:auto;z-index:50;transition:transform .3s}
.brand{padding:20px 22px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:2}
.brand .logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--primary),var(--primary-2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0}
.brand b{font-family:'Cairo';font-size:16px;display:block}
.brand span{font-size:11.5px;color:var(--muted)}
.nav-group{padding:8px 12px}
.nav-group .gt{font-size:11px;font-weight:700;color:var(--muted);padding:12px 12px 6px;letter-spacing:.3px}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;color:var(--text-2);font-weight:600;font-size:13.5px;cursor:pointer;transition:.15s;margin-bottom:2px}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.active{background:linear-gradient(90deg,rgba(31,111,235,.14),transparent);color:var(--primary)}
.nav-item .ic{width:20px;text-align:center;font-size:16px}
#main{margin-right:var(--sidebar);flex:1;min-width:0;display:flex;flex-direction:column}
#topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 22px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:40;flex-wrap:wrap}
#topbar .menu-btn{display:none;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;width:40px;height:40px;font-size:18px;color:var(--text)}
.tb-title{font-family:'Cairo';font-weight:700;font-size:17px;margin-left:auto}
.tb-ctrl{display:flex;align-items:center;gap:8px}
.tb-ctrl select{padding:8px 11px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface-2);color:var(--text);font-weight:600;font-size:13px}
.icon-btn{width:40px;height:40px;border-radius:11px;border:1.5px solid var(--border);background:var(--surface-2);color:var(--text);font-size:17px;display:flex;align-items:center;justify-content:center;position:relative}
.icon-btn:hover{border-color:var(--primary);color:var(--primary)}
.badge-dot{position:absolute;top:6px;left:8px;width:8px;height:8px;background:var(--red);border-radius:50%;border:2px solid var(--surface)}
#content{padding:22px;max-width:1500px;width:100%;margin:0 auto}
.page{animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.page-head h2{font-size:21px}
.page-head .sub{color:var(--text-2);font-size:13.5px}
.spacer{margin-right:auto}

/* ===== Cards / KPIs ===== */
.grid{display:grid;gap:16px}
.kpi-grid{grid-template-columns:repeat(auto-fill,minmax(230px,1fr))}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
.card h3{font-size:15px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.kpi{position:relative;overflow:hidden}
.kpi .k-ic{position:absolute;left:16px;top:16px;width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px}
.kpi .k-label{color:var(--text-2);font-size:13px;font-weight:600;margin-bottom:8px}
.kpi .k-val{font-family:'Cairo';font-size:26px;font-weight:800;letter-spacing:-.5px}
.kpi .k-sub{font-size:12px;margin-top:6px;color:var(--muted);display:flex;align-items:center;gap:5px}
.k-up{color:var(--green)}.k-down{color:var(--red)}
.tone-blue .k-ic{background:rgba(31,111,235,.13);color:var(--primary)}
.tone-green .k-ic{background:var(--green-bg);color:var(--green)}
.tone-red .k-ic{background:var(--red-bg);color:var(--red)}
.tone-amber .k-ic{background:var(--amber-bg);color:var(--amber)}
.tone-purple .k-ic{background:rgba(124,77,255,.13);color:var(--purple)}
.chart-box{position:relative;height:300px}
.chart-box.sm{height:240px}

/* ===== Tables ===== */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
table.dt{width:100%;border-collapse:collapse;background:var(--surface);font-size:13.5px;min-width:640px}
table.dt th{background:var(--surface-2);padding:12px 10px;font-weight:700;text-align:right;color:var(--text-2);font-size:12.5px;white-space:nowrap;border-bottom:2px solid var(--border);position:sticky;top:0}
table.dt td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap}
table.dt tbody tr:hover,table.dt tr:hover{background:var(--surface-2)}
table.dt tfoot td,table.dt .total-row td{background:var(--surface-2);font-weight:800;color:var(--text)}
table.dt input,table.dt select{width:100%;min-width:80px;padding:6px 8px;border:1px solid transparent;border-radius:7px;background:transparent;color:var(--text)}
table.dt input:focus,table.dt select:focus{outline:none;border-color:var(--primary);background:var(--surface-2)}
table.dt input:hover,table.dt select:hover{background:var(--surface-2)}
.cell-calc{color:var(--primary);font-weight:700}
.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.tag.g{background:var(--green-bg);color:var(--green)}
.tag.r{background:var(--red-bg);color:var(--red)}
.tag.a{background:var(--amber-bg);color:var(--amber)}
.tag.b{background:rgba(31,111,235,.13);color:var(--primary)}
.row-del{color:var(--red);background:transparent;border:none;font-size:16px;padding:4px 8px;border-radius:7px}
.row-del:hover{background:var(--red-bg)}
.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}

/* ===== Reports ===== */
.rep-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.rep-section{margin-bottom:8px}
.rep-line{display:flex;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);font-size:14px}
.rep-line:last-child{border-bottom:none}
.rep-line .lbl{color:var(--text-2)}
.rep-line .val{font-weight:800;font-family:'Cairo'}
.rep-line.tot{background:var(--surface-2);border-radius:10px;font-size:15px;margin-top:6px}
.rep-head{font-family:'Cairo';font-weight:800;color:var(--primary);padding:6px 4px;font-size:15px;border-bottom:2px solid var(--primary);margin-bottom:4px;display:flex;align-items:center;gap:8px}
.pos{color:var(--green)}.neg{color:var(--red)}

/* modal / toast */
#modal-bg{position:fixed;inset:0;background:rgba(8,14,26,.55);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px}
.modal{background:var(--surface);border-radius:20px;box-shadow:var(--shadow-lg);width:100%;max-width:480px;padding:26px;animation:pop .25s}
.modal h3{margin-bottom:16px;font-size:18px}
.modal .actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-start}
#toasts{position:fixed;bottom:24px;left:24px;z-index:300;display:flex;flex-direction:column;gap:10px}
.toast{background:var(--surface);border:1px solid var(--border);border-right:4px solid var(--primary);border-radius:12px;padding:13px 18px;box-shadow:var(--shadow-lg);min-width:260px;animation:slidein .3s;font-size:13.5px;font-weight:600}
.toast.ok{border-right-color:var(--green)}.toast.err{border-right-color:var(--red)}.toast.warn{border-right-color:var(--amber)}
@keyframes slidein{from{transform:translateX(-30px);opacity:0}to{transform:none;opacity:1}}
.empty{text-align:center;padding:40px;color:var(--muted)}
.empty .big{font-size:44px;margin-bottom:10px;opacity:.5}
.notif-panel{position:absolute;top:52px;left:0;width:340px;background:var(--surface);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:8px;max-height:420px;overflow-y:auto;z-index:60}
.notif-item{padding:11px 12px;border-radius:10px;font-size:13px;display:flex;gap:10px;align-items:flex-start}
.notif-item:hover{background:var(--surface-2)}
.notif-item .ni{font-size:16px}
.pill{padding:4px 12px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);font-size:12.5px;font-weight:700}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.info-box{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;font-size:13.5px;color:var(--text-2);line-height:1.8}
.doc h3{color:var(--primary);margin:22px 0 8px;font-size:17px}
.doc h4{margin:16px 0 6px;font-size:15px}
.doc p,.doc li{color:var(--text-2);font-size:14px;margin-bottom:6px}
.doc ul{padding-right:22px;margin-bottom:10px}
.mini-stat{display:flex;gap:14px;flex-wrap:wrap}
.mini-stat .ms{flex:1;min-width:120px;background:var(--surface-2);border-radius:12px;padding:12px 14px}
.mini-stat .ms b{font-family:'Cairo';font-size:19px;display:block}
.mini-stat .ms span{font-size:12px;color:var(--muted)}
.print-only{display:none}

@media(max-width:980px){
  :root{--sidebar:0px}
  #sidebar{transform:translateX(100%);width:280px;box-shadow:var(--shadow-lg)}
  #sidebar.open{transform:none}
  #main{margin-right:0}
  #topbar .menu-btn{display:flex}
  .tb-title{display:none}
  .rep-grid,.two-col{grid-template-columns:1fr}
}
@media print{
  #sidebar,#topbar,.toolbar,.no-print,#toasts{display:none!important}
  #main{margin:0}#content{padding:0;max-width:100%}
  .print-only{display:block}
  body{background:#fff;font-size:12px}
  .card{box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
}
</style>
</head>
<body data-theme="light">

<!-- ============ LOGIN ============ -->
<div id="login">
  <form class="login-card" onsubmit="doLogin(event)">
    <div class="login-logo">🏢</div>
    <h1>النظام المالي التنفيذي</h1>
    <p>منصة المحاسبة وإدارة الفروع — <span id="lgCompany">شركة الطيف الأولى</span></p>
    <div class="field"><label>اسم المستخدم</label><input id="lg-user" autocomplete="username" placeholder="admin" required></div>
    <div class="field"><label>كلمة المرور</label><input id="lg-pass" type="password" autocomplete="current-password" placeholder="••••••••" required></div>
    <button class="btn block" type="submit">🔐 تسجيل الدخول</button>
    <div class="login-hint">الدخول الافتراضي: <b>admin</b> / <b>admin123</b></div>
    <div style="margin-top:14px" id="cloudStatusLogin"></div>
    <button type="button" class="btn ghost block" style="margin-top:8px" onclick="cloudSetup()">☁️ الاتصال بقاعدة بيانات سحابية مشتركة</button>
  </form>
</div>

<!-- ============ APP ============ -->
<div id="app" class="hidden">
  <aside id="sidebar">
    <div class="brand">
      <div class="logo">🏢</div>
      <div><b id="brandCompany">شركة الطيف الأولى</b><span>النظام المالي التنفيذي</span></div>
    </div>
    <nav id="nav"></nav>
  </aside>

  <div id="main">
    <header id="topbar">
      <button class="menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>
      <div class="tb-ctrl">
        <span style="font-size:16px">🏢</span>
        <select id="branchSel" onchange="switchBranch(this.value)"></select>
      </div>
      <div class="tb-ctrl">
        <select id="monthSel" onchange="setPeriod()"></select>
        <select id="yearSel" onchange="setPeriod()"></select>
      </div>
      <div class="tb-title" id="tbTitle">لوحة المؤشرات</div>
      <div class="tb-ctrl" style="position:relative">
        <button class="icon-btn" onclick="toggleNotif()" title="التنبيهات">🔔<span class="badge-dot hidden" id="notifDot"></span></button>
        <div class="notif-panel hidden" id="notifPanel"></div>
      </div>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="الوضع الليلي">🌙</button>
      <div class="tb-ctrl" style="position:relative">
        <button class="icon-btn" onclick="document.getElementById('userMenu').classList.toggle('hidden')" title="الحساب">👤</button>
        <div class="notif-panel hidden" id="userMenu" style="width:220px">
          <div style="padding:12px;border-bottom:1px solid var(--border)"><b id="umName"></b><br><span style="font-size:12px;color:var(--muted)" id="umRole"></span></div>
          <div class="notif-item" onclick="go('users')">👥 إدارة المستخدمين</div>
          <div class="notif-item" onclick="go('backup')">💾 النسخ الاحتياطي</div>
          <div class="notif-item" onclick="logout()" style="color:var(--red)">🚪 تسجيل الخروج</div>
        </div>
      </div>
    </header>
    <div id="content"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
/* ================================================================
   النظام المالي التنفيذي — محرك البيانات والصيغ (Formula Engine)
   يخزّن البيانات محلياً (localStorage) — تُدخل مرة واحدة وتُحدّث كل التقارير آلياً
================================================================ */
const LS='qasim_fms_v1';
const CATS=['مشتريات','رواتب','مصروف شخصي','صيانة','مستلزمات','نقل','إيجار','كهرباء','غاز','أخرى'];
const METHODS=['كاش','شبكة'];
const APPS=[['hunger','هنجر ستيشن'],['keeta','كيتا'],['ninja','نينجا'],['mrsool','مرسول'],['jahez','جاهز'],['toyo','تويو']];
const DAYS=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const MONTHS=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const ROLES={admin:'مدير عام',accountant:'محاسب',viewer:'مشاهد'};

let DB, S={branch:null,month:new Date().getMonth()+1,year:2026,page:'dashboard',charts:{}};

/* ---------- Persistence ---------- */
function seed(){
  const bid='br_'+Date.now();
  return {
    users:[{u:'admin',p:'admin123',name:'المدير العام',role:'admin'}],
    branches:[{id:bid,name:'فرع طيبة',created:today()}],
    daily:[], expenses:[], apps:[], salaries:[], withdrawals:[], budget:[],
    audit:[], settings:{theme:'light',autobackup:true,currency:'ريال',company:'شركة الطيف الأولى'},
    backups:[]
  };
}
function load(){ try{DB=JSON.parse(localStorage.getItem(LS))||seed();}catch(e){DB=seed();} if(!DB.branches.length)DB.branches.push({id:'br_'+Date.now(),name:'فرع رئيسي',created:today()}); if(!DB.settings.company)DB.settings.company='شركة الطيف الأولى'; }
function applyBranding(){ const co=DB.settings.company||'شركة الطيف الأولى'; ['brandCompany','lgCompany'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=co;}); document.title='النظام المالي التنفيذي | '+co; }
function save(){ localStorage.setItem(LS,JSON.stringify(DB)); if(CLOUD.on) pushMeta(); if(DB.settings.autobackup) autoBackup(); }

/* ================= CLOUD SYNC (Firestore) — اختياري ================= */
const FB_CFG_KEY='spectrum_fb_cfg';
const COLLS=['daily','expenses','salaries','withdrawals','budget'];
let CLOUD={on:false,db:null};
function rput(type,rec){ if(CLOUD.on&&rec&&rec.id){ try{CLOUD.db.collection(type).doc(String(rec.id)).set(JSON.parse(JSON.stringify(rec)));}catch(e){} } }
function rdel(type,id){ if(CLOUD.on){ try{CLOUD.db.collection(type).doc(String(id)).delete();}catch(e){} } }
function pushMeta(){ if(!CLOUD.on)return; try{CLOUD.db.collection('_meta').doc('main').set({branches:DB.branches,users:DB.users,settings:DB.settings,audit:(DB.audit||[]).slice(0,300),backups:DB.backups||[]});}catch(e){} }
function pushAll(){ if(!CLOUD.on){toast('غير متصل بالسحابة','warn');return;} pushMeta(); COLLS.forEach(t=>(DB[t]||[]).forEach(r=>rput(t,r))); toast('تم رفع كل البيانات المحلية إلى السحابة'); }
function startCloud(cfg,announce){
  try{
    if(!firebase.apps.length) firebase.initializeApp(cfg);
    CLOUD.db=firebase.firestore(); CLOUD.on=true;

/* ================================================================
   FORMULA ENGINE — كل القيم تُحسب ديناميكياً (تطابق منطق ملف Excel)
================================================================ */
function calc(branch=S.branch){
  const D=rows('daily',branch), E=rows('expenses',branch), A=rows('apps',branch),
        Sal=rows('salaries',branch), W=rows('withdrawals',branch),
        Bud=DB.budget.find(b=>b.branchId===branch&&b.month===ym())||{};
  // --- Daily aggregates (الإدخال اليومي) ---
  let cash=0,network=0,cashExp=0,netExp=0,dWith=0,dSal=0;
  D.forEach(r=>{cash+=num(r.cash);network+=num(r.network);cashExp+=num(r.cashExp);netExp+=num(r.netExp);dWith+=num(r.withdrawals);dSal+=num(r.salaries);});
  const totalSales=cash+network, opExp=cashExp+netExp;
  // --- Salaries sheet (الرواتب): withdrawn are amounts paid ---
  const salPaid=Sal.reduce((s,r)=>s+num(r.withdrawn),0);
  const salBasic=Sal.reduce((s,r)=>s+num(r.basic),0);
  // --- Personal withdrawals (السحبيات الشخصية) ---
  const wCash=W.filter(r=>r.method==='كاش').reduce((s,r)=>s+num(r.amount),0);
  const wNet=W.filter(r=>String(r.method).includes('شبكة')).reduce((s,r)=>s+num(r.amount),0);
  const wTotal=wCash+wNet;
  // --- Dashboard formulas (لوحة التحكم) ---
  const totalExpensesAll=opExp+salPaid+wTotal;
  const netRemaining=totalSales-opExp-salPaid-wTotal;              // صافي المتبقي
  const cashBalance=cash-cashExp-salPaid-wCash;                    // رصيد الصندوق كاش
  const netBalance=network-netExp-wNet;                           // رصيد الشبكة
  const cashOut=cashExp+salPaid+wCash;                            // مصروفات خارجة من الكاش
  const netOut=netExp+wNet;                                       // مصروفات خارجة من الشبكة
  // --- Delivery apps (مُدمجة داخل الإدخال اليومي لكل فرع) ---
  const appsTotal=D.reduce((s,r)=>s+APPS.reduce((x,[k])=>x+num(r[k]),0),0);
  const appsByApp={}; APPS.forEach(([k,l])=>appsByApp[l]=D.reduce((s,r)=>s+num(r[k]),0));
  // --- Expense ledger by category ---
  const byCat={}; CATS.forEach(c=>byCat[c]=0);
  E.forEach(r=>{byCat[r.category]=(byCat[r.category]||0)+num(r.amount);});
  const ledgerTotal=E.reduce((s,r)=>s+num(r.amount),0);
  // --- Statistics ---
  const sold=D.filter(r=>num(r.cash)+num(r.network)>0);
  const bestDay=sold.reduce((m,r)=>num(r.cash)>num(m?.cash||-1)?r:m,null);
  const worstDay=sold.reduce((m,r)=>(m===null||num(r.cash)<num(m.cash))?r:m,null);
  const daysWorked=sold.length;
  const avgDaily=daysWorked?totalSales/daysWorked:0;
  // --- Ratios ---
  const expRatio=totalSales?opExp/totalSales:0, salRatio=totalSales?salPaid/totalSales:0,
        profitMargin=totalSales?netRemaining/totalSales:0, netRatio=totalSales?(totalSales-totalExpensesAll)/totalSales:0;
  return {cash,network,totalSales,cashExp,netExp,opExp,salPaid,salBasic,wCash,wNet,wTotal,
    totalExpensesAll,netRemaining,cashBalance,netBalance,cashOut,netOut,
    appsTotal,appsByApp,byCat,ledgerTotal,bestDay,worstDay,daysWorked,avgDaily,
    expRatio,salRatio,profitMargin,netRatio,budget:Bud,dWith,dSal,records:{D,E,A,Sal,W}};
}
/* Ten-day periods (تقرير 10 أيام) */
function tenDay(branch=S.branch){
  const D=rows('daily',branch); const parts=[[1,10],[11,20],[21,31]];
  return parts.map(([a,b],i)=>{
    const seg=D.filter(r=>{const d=+r.date.slice(8,10);return d>=a&&d<=b;});
    const cash=seg.reduce((s,r)=>s+num(r.cash),0), net=seg.reduce((s,r)=>s+num(r.network),0);
    const exp=seg.reduce((s,r)=>s+num(r.cashExp)+num(r.netExp),0);
    const sal=seg.reduce((s,r)=>s+num(r.salaries),0), wd=seg.reduce((s,r)=>s+num(r.withdrawals),0);
    const rev=cash+net, netv=rev-exp-sal-wd;
    return {label:['الفترة الأولى (1-10)','الفترة الثانية (11-20)','الفترة الثالثة (21-31)'][i],from:a,to:b,cash,net,rev,exp,sal,wd,net_:netv};
  });
}
/* Annual: aggregate 12 months */
function annual(branch=S.branch,year=S.year){
  return Array.from({length:12},(_,m)=>{
    const p=year+'-'+String(m+1).padStart(2,'0');
    const D=DB.daily.filter(r=>r.branchId===branch&&r.date.slice(0,7)===p);
    const Sal=DB.salaries.filter(r=>r.branchId===branch&&r.month===p);
    const W=DB.withdrawals.filter(r=>r.branchId===branch&&r.date.slice(0,7)===p);
    const cash=D.reduce((s,r)=>s+num(r.cash),0),net=D.reduce((s,r)=>s+num(r.network),0);
    const opExp=D.reduce((s,r)=>s+num(r.cashExp)+num(r.netExp),0);
    const sal=Sal.reduce((s,r)=>s+num(r.withdrawn),0);
    const wt=W.reduce((s,r)=>s+num(r.amount),0);
    const rev=cash+net; return {month:m+1,name:MONTHS[m],cash,net,rev,opExp,sal,wt,expAll:opExp+sal+wt,netv:rev-opExp-sal-wt};
  });
}
/* Consolidated across all branches */
function consolidated(){
  return DB.branches.map(b=>({branch:b,...calc(b.id)}));
}

  mkChart('ch-split',{type:'doughnut',data:{labels:['كاش','شبكة'],datasets:[{data:[c.cash,c.network],backgroundColor:[cvar('--primary'),cvar('--accent')]}]},options:opts(true)});
  const cats=Object.entries(c.byCat).filter(([,v])=>v>0);
  mkChart('ch-cat',{type:'bar',data:{labels:cats.map(x=>x[0]),datasets:[{data:cats.map(x=>x[1]),backgroundColor:cvar('--red'),borderRadius:6}]},options:opts()});
  const ap=Object.entries(c.appsByApp).filter(([,v])=>v>0);
  mkChart('ch-apps',{type:'bar',data:{labels:ap.map(x=>x[0]),datasets:[{data:ap.map(x=>x[1]),backgroundColor:cvar('--primary'),borderRadius:6}]},options:opts()});
};
function cvar(v){return getComputedStyle(document.body).getPropertyValue(v).trim();}
function mkChart(id,cfg){const el=document.getElementById(id);if(!el)return;S.charts[id]=new Chart(el,cfg);}
function opts(legend){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{display:!!legend||undefined,labels:{font:{family:'Tajawal'},color:cvar('--text-2')},position:'bottom'}},scales:legend?{}:{x:{ticks:{color:cvar('--muted'),font:{family:'Tajawal'}},grid:{color:cvar('--border')}},y:{ticks:{color:cvar('--muted'),font:{family:'Tajawal'}},grid:{color:cvar('--border')}}}};}

<script>
/* ================================================================

================================================================ */
/* ---- الإدخال اليومي ---- */
PAGES.daily=function(){
  const D=rows('daily').sort((a,b)=>(a.date||'').localeCompare(b.date||''));

  <div class="table-wrap"><table class="dt"><thead><tr>
    <th>التاريخ</th><th>اليوم</th><th>كاش</th><th>شبكة</th>${APPS.map(([,l])=>`<th>${l}</th>`).join('')}<th>إجمالي التطبيقات</th><th>إجمالي المبيعات</th><th>مصروفات كاش</th><th>مصروفات شبكة</th><th>إجمالي المصروفات</th><th>سحبيات</th><th>رواتب</th><th>صافي اليوم</th><th>الحالة</th><th>ملاحظات</th>${can('edit')?'<th></th>':''}</tr></thead><tbody>
    ${D.length?D.map(r=>dailyRow(r)).join(''):`<tr><td colspan="${20+(can('edit')?1:0)}"><div class="empty"><div class="big">🧾</div>لا توجد بيانات — ابدأ بإضافة يوم</div></td></tr>`}
  </tbody><tfoot><tr class="total-row">
    <td colspan="2">الإجمالي الشهري</td><td>${n0(c.cash)}</td><td>${n0(c.network)}</td>${APPS.map(([,l])=>`<td>${n0(c.appsByApp[l])}</td>`).join('')}<td>${n0(c.appsTotal)}</td><td>${n0(c.totalSales)}</td><td>${n0(c.cashExp)}</td><td>${n0(c.netExp)}</td><td>${n0(c.opExp)}</td><td>${n0(c.dWith)}</td><td>${n0(c.dSal)}</td><td>${n0(c.totalSales-c.opExp-c.dWith-c.dSal)}</td><td colspan="${can('edit')?3:2}"></td>
  </tr></tfoot></table></div>`;
};
function dailyRow(r){
  const sales=num(r.cash)+num(r.network), exp=num(r.cashExp)+num(r.netExp), net=sales-exp-num(r.withdrawals)-num(r.salaries);
  const appsT=APPS.reduce((s,[k])=>s+num(r[k]),0);
  const dow=r.date?DAYS[new Date(r.date).getDay()]:'';
  const ed=can('edit');
  const f=(k,v)=>ed?`<input type="${k==='date'?'date':'number'}" value="${v??''}" onchange="upd('daily','${r.id}','${k}',this.value)">`:(k==='date'?v:n0(v));
  return `<tr>
    <td>${f('date',r.date)}</td><td>${dow}</td>
    <td>${f('cash',r.cash)}</td><td>${f('network',r.network)}</td>
    ${APPS.map(([k])=>`<td>${f(k,r[k])}</td>`).join('')}
    <td class="cell-calc">${n0(appsT)}</td>
    <td class="cell-calc">${n0(sales)}</td>
    <td>${f('cashExp',r.cashExp)}</td><td>${f('netExp',r.netExp)}</td>
    <td class="cell-calc">${n0(exp)}</td>
    <td>${f('withdrawals',r.withdrawals)}</td><td>${f('salaries',r.salaries)}</td>
    <td class="cell-calc ${net>=0?'pos':'neg'}">${n0(net)}</td>
    <td>${sales===0?'':(net>=0?'<span class="tag g">فائض ✅</span>':'<span class="tag r">عجز ❌</span>')}</td>
    <td>${ed?`<input value="${r.notes||''}" onchange="upd('daily','${r.id}','notes',this.value)">`:(r.notes||'')}</td>
    ${ed?`<td><button class="row-del" onclick="del('daily','${r.id}')">🗑️</button></td>`:''}</tr>`;
}
function addDaily(){
  const d=rows('daily'); const day=String(d.length+1).padStart(2,'0');

      <td>${ed?`<input value="${r.notes||''}" onchange="upd('salaries','${r.id}','notes',this.value)">`:(r.notes||'')}</td>
      ${ed?`<td><button class="row-del" onclick="del('salaries','${r.id}')">🗑️</button></td>`:''}</tr>`;}).join(''):`<tr><td colspan="9"><div class="empty"><div class="big">👨‍🍳</div>لا يوجد موظفون</div></td></tr>`}
  </tbody><tfoot><tr class="total-row"><td colspan="3">الإجمالي</td><td>${n0(tb)}</td><td>${n0(tw)}</td><td>${n0(tr)}</td><td colspan="${can('edit')?3:2}"></td></tr></tfoot></table></div>`;

function addSalary(){const o={id:uid(),branchId:S.branch,month:ym(),name:'',position:'',basic:'',withdrawn:'',payDate:'',notes:''};DB.salaries.push(o);if(CLOUD.on)rput('salaries',o);audit('إضافة موظف');save();render();}

    ${W.length?W.map(r=>{const ed=can('edit');return `<tr>
      <td>${ed?`<input type="date" value="${r.date||''}" onchange="upd('withdrawals','${r.id}','date',this.value)">`:r.date}</td>

/* ---- المصروفات التشغيلية بالتفصيل ---- */
PAGES.opex=function(){

  const items=['بضاعة','إيجار','نثريات وصيانة','لواصق أمان','غاز','بترول','طباعة','غسيل زجاج','كهرباء','صيانة الباص','إنترنت','رسوم البنك'];

    <div class="card"><h3>ℹ️ ملاحظة</h3><div class="info-box">تُحتسب بنود المصروفات التشغيلية تلقائياً من دفتر «المصروفات التفصيلية» حسب التصنيف. لإضافة بند، سجّله في صفحة المصروفات التفصيلية باختيار التصنيف المناسب، وسيظهر هنا مباشرة.</div>

AFTER.opex=function(){const c=calc();const e=Object.entries(c.byCat).filter(([,v])=>v>0);mkChart('ch-opex',{type:'polarArea',data:{labels:e.map(x=>x[0]),datasets:[{data:e.map(x=>x[1]),backgroundColor:['#1f6feb','#c9a227','#1b9e5a','#d64545','#7c4dff','#e0a92e','#0d47a1','#33c37d','#f06565','#9d7bff']}]},options:opts(true)});};

/* ---- shared cell helpers ---- */
function sel(arr,val,handler){return `<select onchange="${handler}">${arr.map(o=>`<option ${o===val?'selected':''}>${o}</option>`).join('')}</select>`;}
function uid(){return 'r'+Date.now()+Math.random().toString(36).slice(2,7);}
function upd(type,id,key,val){
  const r=DB[type].find(x=>x.id===id);if(!r)return;
  if(key==='date'&&type==='daily'){ if(DB.daily.some(x=>x!==r&&x.branchId===S.branch&&x.date===val)) toast('تنبيه: هذا التاريخ مُدخل مسبقاً (تكرار محتمل)','warn'); }
  r[key]=val; if(CLOUD.on)rput(type,r); audit(`تعديل ${type}`); save();
  // re-render totals live without losing focus for calc columns
  if(['dashboard'].includes(S.page)||key==='date'||type==='daily'||type==='apps'||type==='salaries')render();
  refreshNotifDot();
}
function del(type,id){confirmBox('تأكيد الحذف','هل تريد حذف هذا السجل نهائياً؟',()=>{DB[type]=DB[type].filter(x=>x.id!==id);if(CLOUD.on)rdel(type,id);audit(`حذف ${type}`);save();render();toast('تم الحذف');});}
</script>
<script>
/* ================================================================
   REPORTS
================================================================ */
function repLine(l,v,cls=''){return `<div class="rep-line"><span class="lbl">${l}</span><span class="val ${cls}">${v}</span></div>`;}
function repTot(l,v,cls=''){return `<div class="rep-line tot"><span class="lbl">${l}</span><span class="val ${cls}">${v}</span></div>`;}

/* التقرير اليومي — لفرع واحد أو عدة فروع */
function dailyReportData(){
  // sanitize selection
  if(!S.repBranches||!S.repBranches.length) S.repBranches=[S.branch];
  S.repBranches=S.repBranches.filter(id=>DB.branches.some(b=>b.id===id));
  if(!S.repBranches.length) S.repBranches=[S.branch];
  let recs=[];
  S.repBranches.forEach(bid=>{
    const bn=DB.branches.find(b=>b.id===bid).name;
    DB.daily.filter(r=>r.branchId===bid&&inPeriod(r.date)).forEach(r=>{
      const rev=num(r.cash)+num(r.network),exp=num(r.cashExp)+num(r.netExp),net=rev-exp-num(r.withdrawals)-num(r.salaries);

PAGES.budget=function(){

      <div class="mini-stat" style="margin-top:12px"><div class="ms"><b>${pct(x.profitMargin)}</b><span>هامش الربح</span></div><div class="ms"><b>${n0(x.daysWorked)}</b><span>أيام العمل</span></div></div></div>`).join('')}</div>`;

/* التقرير الموحّد */
PAGES.consolidated=function(){
  const C=consolidated();const T=C.reduce((a,x)=>({rev:a.rev+x.totalSales,exp:a.exp+x.totalExpensesAll,sal:a.sal+x.salPaid,net:a.net+x.netRemaining,cash:a.cash+x.cashBalance,netb:a.netb+x.netBalance}),{rev:0,exp:0,sal:0,net:0,cash:0,netb:0});
  return head('التقرير المالي الموحّد','جميع الفروع — '+periodLabel(),`<button class="btn ghost sm no-print" onclick="window.print()">🖨️ طباعة</button>`)
  +`<div class="grid kpi-grid" style="margin-bottom:16px">${kpi('إجمالي إيرادات المجموعة',money(T.rev),'💵','tone-green')}${kpi('إجمالي المصروفات',money(T.exp),'💸','tone-red')}${kpi('صافي المجموعة',money(T.net),'📈','tone-blue')}${kpi('إجمالي الأرصدة النقدية',money(T.cash+T.netb),'🏦','tone-amber')}</div>
  <div class="table-wrap"><table class="dt"><thead><tr><th>الفرع</th><th>الإيرادات</th><th>المصروفات</th><th>الرواتب</th><th>رصيد الكاش</th><th>رصيد الشبكة</th><th>الصافي</th></tr></thead><tbody>
  ${C.map(x=>`<tr><td><b>${x.branch.name}</b></td><td>${n0(x.totalSales)}</td><td>${n0(x.totalExpensesAll)}</td><td>${n0(x.salPaid)}</td><td>${n0(x.cashBalance)}</td><td>${n0(x.netBalance)}</td><td class="${x.netRemaining>=0?'pos':'neg'}">${n0(x.netRemaining)}</td></tr>`).join('')}
  <tr class="total-row"><td>الإجمالي الموحّد</td><td>${n0(T.rev)}</td><td>${n0(T.exp)}</td><td>${n0(T.sal)}</td><td>${n0(T.cash)}</td><td>${n0(T.netb)}</td><td>${n0(T.net)}</td></tr>
  </tbody></table></div>`;
};
/* إدارة الفروع */
PAGES.branches=function(){

  +`<div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(260px,1fr))">

      <div style="margin-top:12px;display:flex;gap:8px"><button class="btn ghost sm" onclick="renameBranch('${b.id}')">✏️ تعديل</button>${DB.branches.length>1?`<button class="btn red sm" onclick="delBranch('${b.id}')">🗑️ حذف</button>`:''}</div></div>`).join('')}</div>`;

function addBranch(){promptBox('اسم الفرع الجديد','',v=>{if(!v)return;DB.branches.push({id:'br_'+Date.now(),name:v,created:today()});audit('إضافة فرع: '+v);save();buildSelectors();render();toast('تمت إضافة الفرع');});}
function renameBranch(id){const b=DB.branches.find(x=>x.id===id);promptBox('تعديل اسم الفرع',b.name,v=>{if(!v)return;b.name=v;audit('تعديل فرع');save();buildSelectors();render();});}
function delBranch(id){confirmBox('حذف الفرع','سيتم حذف الفرع وكل بياناته نهائياً. متابعة؟',()=>{['daily','expenses','apps','salaries','withdrawals','budget'].forEach(t=>DB[t]=DB[t].filter(r=>r.branchId!==id));DB.branches=DB.branches.filter(b=>b.id!==id);if(S.branch===id)S.branch=DB.branches[0].id;audit('حذف فرع');save();buildSelectors();render();toast('تم حذف الفرع');});}

/* المستخدمون */
PAGES.users=function(){

  return head('المستخدمون والصلاحيات','إدارة حسابات الدخول والأدوار',`<button class="btn sm" onclick="addUser()">➕ مستخدم</button>`)
  +`<div class="table-wrap"><table class="dt"><thead><tr><th>الاسم</th><th>اسم المستخدم</th><th>الدور</th><th>الصلاحيات</th><th></th></tr></thead><tbody>

  <div class="info-box" style="margin-top:14px"><b>الأدوار:</b> «مدير عام» صلاحيات كاملة تشمل الفروع والمستخدمين والنسخ · «محاسب» إدخال وتعديل البيانات والتقارير · «مشاهد» عرض التقارير فقط دون تعديل.</div>`;

function addUser(){promptBox('اسم المستخدم الجديد','',u=>{if(!u)return;if(DB.users.some(x=>x.u===u)){toast('الاسم مستخدم','err');return;}promptBox('الاسم الكامل','',name=>{promptBox('كلمة المرور','',p=>{promptBox('الدور (admin / accountant / viewer)','viewer',role=>{if(!ROLES[role])role='viewer';DB.users.push({u,p:p||'123456',name:name||u,role});audit('إضافة مستخدم');save();render();toast('تمت الإضافة');});});});});}
function delUser(u){confirmBox('حذف المستخدم','متابعة الحذف؟',()=>{DB.users=DB.users.filter(x=>x.u!==u);audit('حذف مستخدم');save();render();});}

  ${DB.audit.length?DB.audit.slice(0,200).map(a=>`<tr><td>${new Date(a.t).toLocaleString('ar-EG')}</td><td>${a.u}</td><td>${a.branch||'—'}</td><td>${a.action}</td></tr>`).join(''):'<tr><td colspan="4"><div class="empty">لا يوجد نشاط بعد</div></td></tr>'}</tbody></table></div>`;

<script>
/* ================================================================
   BACKUP / EXPORT / SETTINGS / DOCS
================================================================ */
PAGES.backup=function(){
  return head('النسخ الاحتياطي والاستعادة','حماية بياناتك واستعادتها بضغطة واحدة')
  +`<div class="two-col">
    <div class="card"><h3>💾 إنشاء نسخة احتياطية</h3><p style="color:var(--text-2);margin-bottom:14px">تصدير نسخة كاملة من كل بيانات النظام (كل الفروع، المستخدمين، السجل).</p>
      <button class="btn block" onclick="downloadBackup()">⬇️ تنزيل نسخة احتياطية (JSON)</button>
      <button class="btn ghost block" style="margin-top:10px" onclick="snapshot()">📸 حفظ لقطة داخلية</button>
      <label style="display:flex;align-items:center;gap:8px;margin-top:14px;font-size:13.5px"><input type="checkbox" ${DB.settings.autobackup?'checked':''} onchange="DB.settings.autobackup=this.checked;save();toast('تم الحفظ')"> تفعيل النسخ الاحتياطي التلقائي عند كل تعديل</label></div>
    <div class="card"><h3>♻️ الاستعادة</h3><p style="color:var(--text-2);margin-bottom:14px">استعد بياناتك من ملف نسخة احتياطية سابق.</p>
      <input type="file" id="restoreFile" accept=".json" class="field" style="width:100%;padding:10px;border:1.5px dashed var(--border);border-radius:12px;background:var(--surface-2)">
      <button class="btn amber block" style="margin-top:10px" onclick="restoreBackup()">♻️ استعادة من ملف</button></div></div>
  <div class="card" style="margin-top:16px"><h3>🗂️ اللقطات الداخلية المحفوظة</h3>
    ${DB.backups.length?`<div class="table-wrap"><table class="dt"><thead><tr><th>التاريخ</th><th>الحجم</th><th>إجراءات</th></tr></thead><tbody>
    ${DB.backups.map((b,i)=>`<tr><td>${new Date(b.t).toLocaleString('ar-EG')}</td><td>${(b.size/1024).toFixed(1)} ك.ب</td><td><button class="btn ghost sm" onclick="restoreSnap(${i})">استعادة</button></td></tr>`).join('')}</tbody></table></div>`:'<div class="empty">لا توجد لقطات محفوظة بعد</div>'}</div>`;
};
function downloadBackup(){const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});dl(blob,`نسخة_احتياطية_${today()}.json`);audit('تنزيل نسخة احتياطية');toast('تم إنشاء النسخة الاحتياطية');}
function snapshot(){const s=JSON.stringify(DB);DB.backups.unshift({t:new Date().toISOString(),size:s.length,data:s});if(DB.backups.length>10)DB.backups.pop();save();render();toast('تم حفظ لقطة');}
function autoBackup(){const last=DB.backups[0];const now=Date.now();if(!last||now-new Date(last.t).getTime()>3600000){}}
function restoreSnap(i){confirmBox('استعادة اللقطة','سيتم استبدال كل البيانات الحالية. متابعة؟',()=>{const d=JSON.parse(DB.backups[i].data);Object.assign(DB,d);save();if(CLOUD.on)pushAll();buildSelectors();buildNav();go('dashboard');toast('تمت الاستعادة');});}
function restoreBackup(){const f=document.getElementById('restoreFile').files[0];if(!f){toast('اختر ملفاً أولاً','err');return;}const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.branches)throw 0;confirmBox('تأكيد الاستعادة','سيتم استبدال جميع البيانات الحالية بالملف. متابعة؟',()=>{DB=d;save();if(CLOUD.on)pushAll();S.branch=DB.branches[0].id;buildSelectors();buildNav();go('dashboard');toast('تمت الاستعادة بنجاح');});}catch(err){toast('ملف غير صالح','err');}};r.readAsText(f);}

/* ---- EXPORT: Excel (SheetJS) ---- */
function exportExcel(){
  const wb=XLSX.utils.book_new();const c=calc();
  const dash=[[DB.settings.company+' — '+curBranch().name],['الفترة',periodLabel()],[],
    ['ملخص الإيرادات'],['مبيعات كاش',c.cash],['مبيعات شبكة',c.network],['إجمالي الإيرادات',c.totalSales],[],
    ['ملخص المصروفات'],['تشغيلية',c.opExp],['رواتب',c.salPaid],['سحبيات شخصية',c.wTotal],['إجمالي المصروفات',c.totalExpensesAll],[],
    ['النتيجة'],['صافي المتبقي',c.netRemaining],['رصيد الكاش',c.cashBalance],['رصيد الشبكة',c.netBalance],['هامش الربح',c.profitMargin]];
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(dash),'لوحة التحكم');
  const D=rows('daily');XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(D.map(r=>{const o={التاريخ:r.date,كاش:num(r.cash),شبكة:num(r.network)};APPS.forEach(([k,l])=>o[l]=num(r[k]));o['إجمالي التطبيقات']=APPS.reduce((s,[k])=>s+num(r[k]),0);o['إجمالي المبيعات']=num(r.cash)+num(r.network);o['مصروفات كاش']=num(r.cashExp);o['مصروفات شبكة']=num(r.netExp);o['صافي اليوم']=num(r.cash)+num(r.network)-num(r.cashExp)-num(r.netExp)-num(r.withdrawals)-num(r.salaries);return o;})),'الإدخال اليومي');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows('expenses').map(r=>({التاريخ:r.date,البيان:r.name,التصنيف:r.category,الطريقة:r.method,المبلغ:num(r.amount)}))),'المصروفات');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows('salaries').map(r=>({الاسم:r.name,الوظيفة:r.position,'الأساسي':num(r.basic),المصروف:num(r.withdrawn),المتبقي:num(r.basic)-num(r.withdrawn)}))),'الرواتب');
  XLSX.writeFile(wb,`تقرير_${curBranch().name}_${ym()}.xlsx`);audit('تصدير Excel');toast('تم تصدير ملف Excel');
}
function exportCSV(type){
  const data=rows(type);if(!data.length){toast('لا توجد بيانات','warn');return;}
  const keys=Object.keys(data[0]).filter(k=>!['id','branchId'].includes(k));
  const csv='﻿'+[keys.join(',')].concat(data.map(r=>keys.map(k=>`"${r[k]??''}"`).join(','))).join('\n');
  dl(new Blob([csv],{type:'text/csv'}),`${type}_${ym()}.csv`);audit('تصدير CSV');toast('تم تصدير CSV');
}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}

/* ---- إعدادات الشركة + السحابة ---- */
PAGES.settings=function(){
  if(!can('manage'))return noPerm();
  const s=DB.settings;
  return head('إعدادات الشركة','اسم الشركة يظهر في الشعار وجميع التقارير والملفات المصدّرة')
  +`<div class="card" style="max-width:560px">
    <div class="field"><label>اسم الشركة</label><input id="setCompany" value="${s.company||''}" placeholder="شركة الطيف الأولى"></div>
    <div class="field"><label>عملة العرض</label><input id="setCurrency" value="${s.currency||'ريال'}" placeholder="ريال"></div>
    <button class="btn" onclick="saveSettings()">💾 حفظ الإعدادات</button>
    <div class="info-box" style="margin-top:16px">يتم تطبيق الاسم الجديد فوراً على الشعار الجانبي، شاشة الدخول، رأس التقارير، وملفات Excel وPDF المصدّرة.</div>
  </div>
  <div class="card" style="max-width:560px;margin-top:16px"><h3>☁️ المزامنة السحابية (بيانات موحّدة لكل الأجهزة)</h3>
    <div id="cloudStatus" style="margin-bottom:12px"></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" onclick="cloudSetup()">🔗 اتصال / تغيير الإعدادات</button>
      <button class="btn ghost" onclick="pushAll()">⬆️ رفع البيانات المحلية للسحابة</button>
      <button class="btn red" onclick="disconnectCloud()">✖️ فصل السحابة</button>
    </div>
    <div class="info-box" style="margin-top:12px">عند الاتصال بمشروع Firebase الخاص بك، تُحفظ بيانات جميع الفروع في السحابة وتتزامن لحظياً بين كل الأجهزة والمستخدمين. راجع «دليل إعداد Firebase» المرفق. للتشغيل بدون سحابة، يبقى النظام يعمل ببيانات هذا الجهاز فقط.</div>
  </div>`;
};
AFTER.settings=function(){updateCloudBadge();};
function saveSettings(){
  const co=document.getElementById('setCompany').value.trim()||'شركة الطيف الأولى';
  DB.settings.company=co; DB.settings.currency=document.getElementById('setCurrency').value.trim()||'ريال';
  audit('تعديل إعدادات الشركة'); save(); applyBranding(); render(); toast('تم حفظ الإعدادات وتحديث الاسم');
}

/* ---- دليل الاستخدام ---- */
PAGES.docs=function(){
  return head('دليل الاستخدام','توثيق احترافي لكل وحدة في النظام')
  +`<div class="card doc" style="max-width:900px;line-height:1.9">
    <p>نظام مالي تنفيذي متكامل لـ«شركة الطيف الأولى». تُدخل البيانات مرة واحدة، وتتحدث جميع التقارير والمؤشرات تلقائياً عبر محرك صيغ ديناميكي. تُحفظ البيانات محلياً في متصفحك، أو سحابياً عند تفعيل المزامنة.</p>
    <h3>1) وحدات التشغيل اليومي</h3>
    <h4>🧾 الإدخال اليومي</h4><p>القلب النابض للنظام. تُدخل لكل يوم: مبيعات الكاش، مبيعات الشبكة، مبالغ تطبيقات التوصيل، مصروفات الكاش، مصروفات الشبكة، السحبيات، الرواتب. تُحسب تلقائياً: <b>إجمالي المبيعات = كاش + شبكة</b>، <b>إجمالي التطبيقات = مجموع التطبيقات</b>، <b>إجمالي المصروفات = مصروفات كاش + شبكة</b>، <b>صافي اليوم = المبيعات − المصروفات − السحبيات − الرواتب</b>.</p>
    <h4>💸 المصروفات التفصيلية</h4><p>دفتر يومية لكل مصروف مع تصنيفه وطريقة دفعه. يغذّي «تحليل المصروفات حسب التصنيف».</p>
    <h4>🛵 تطبيقات التوصيل</h4><p>تُدخل مبالغ كل تطبيق (هنجر، كيتا، نينجا، مرسول، جاهز، تويو) مباشرةً ضمن صف اليوم في «الإدخال اليومي» لكل فرع، وصفحة التطبيقات تعرض تحليلاً وحصصاً وترتيباً.</p>
    <h4>👨‍🍳 كشف الرواتب</h4><p>لكل موظف: الراتب الأساسي، المصروف، و<b>المتبقي = الأساسي − المصروف</b>.</p>
    <h4>🏧 السحبيات الشخصية</h4><p>تُقسّم آلياً إلى سحبيات كاش وشبكة، وتُخصم من الأرصدة المقابلة.</p>
    <h3>2) التقارير المالية</h3>
    <p><b>اليومي</b> (لفرع واحد أو عدة فروع، تفصيلي أو مجمّع مع طباعة PDF وExcel)، <b>10 أيام</b>، <b>الشهري</b>، <b>السنوي</b>، <b>الأرباح والخسائر</b>، <b>التدفقات النقدية</b>، <b>تحليل الإيرادات والمصروفات</b> — كلها مشتقة تلقائياً.</p>
    <h3>3) التحليل التنفيذي</h3>
    <p><b>الملخص التنفيذي</b>، <b>النسب المالية</b>، <b>الموازنة مقابل الفعلي</b>، <b>تحليل الاتجاهات</b>، <b>التحليل المقارن</b> بين الفروع.</p>
    <h3>4) إدارة الفروع</h3>
    <p>أضف فروعاً <b>غير محدودة</b> دون تعديل أي صيغة. تقرير <b>موحّد</b> لكل الفروع ولوحة <b>مقارنة</b>.</p>
    <h3>5) النظام والأمان والسحابة</h3>
    <p><b>مصادقة</b> بأدوار (مدير عام / محاسب / مشاهد). <b>سجل نشاط</b> يوثّق كل عملية. <b>نسخ احتياطي</b> تنزيل/استعادة/لقطات. <b>تصدير</b> Excel وCSV وطباعة PDF. <b>مزامنة سحابية اختيارية</b> عبر Firebase لتوحيد بيانات كل الفروع لحظياً بين الأجهزة.</p>
    <h3>6) الأتمتة والتنبيهات</h3>
    <p>يكشف النظام: البيانات الناقصة، التواريخ المكررة، أيام بلا مصروفات، حالات العجز، والرواتب غير المصروفة — عبر جرس التنبيهات 🔔.</p>
    <div class="info-box" style="margin-top:16px">💡 <b>نصيحة:</b> فعّل المزامنة السحابية من «إعدادات الشركة» لمشاركة البيانات بين كل الأجهزة والفروع لحظياً.</div>
  </div>`;
};

function confirmBox(title,msg,onOk){
  const bg=document.createElement('div');bg.id='modal-bg';
  bg.innerHTML=`<div class="modal"><h3>${title}</h3><p style="color:var(--text-2)">${msg}</p><div class="actions"><button class="btn red" id="mOk">تأكيد</button><button class="btn ghost" onclick="this.closest('#modal-bg').remove()">إلغاء</button></div></div>`;
  document.body.appendChild(bg);bg.querySelector('#mOk').onclick=()=>{bg.remove();onOk();};bg.onclick=e=>{if(e.target===bg)bg.remove();};
}
function promptBox(title,def,onOk){
  const bg=document.createElement('div');bg.id='modal-bg';
  bg.innerHTML=`<div class="modal"><h3>${title}</h3><div class="field"><input id="mIn" value="${def||''}"></div><div class="actions"><button class="btn" id="mOk">حفظ</button><button class="btn ghost" onclick="this.closest('#modal-bg').remove()">إلغاء</button></div></div>`;
  document.body.appendChild(bg);const inp=bg.querySelector('#mIn');inp.focus();inp.select();
  bg.querySelector('#mOk').onclick=()=>{const v=inp.value.trim();bg.remove();onOk(v);};
  inp.onkeydown=e=>{if(e.key==='Enter'){bg.querySelector('#mOk').click();}};bg.onclick=e=>{if(e.target===bg)bg.remove();};
}

document.addEventListener('click',e=>{if(!e.target.closest('.tb-ctrl')&&!e.target.closest('.icon-btn')){document.getElementById('notifPanel')?.classList.add('hidden');document.getElementById('userMenu')?.classList.add('hidden');}});

(function initCloud(){ try{ const c=localStorage.getItem(FB_CFG_KEY); if(c&&window.firebase){ startCloud(JSON.parse(c),false); } }catch(e){} updateCloudBadge(); })();
</script>
